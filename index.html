<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Statistics Dashboard</title><!-- Libraries --><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script><script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script><style>
body {
    background: #000;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
}

/* Navbar */
.nav {
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #00ffcc;
}

button {
    padding: 8px;
    background: black;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    cursor: pointer;
}

.card {
    display: inline-block;
    border: 1px solid #00ffcc;
    padding: 15px;
    margin: 10px;
    width: 140px;
}

canvas {
    margin: 20px;
    background: #111;
}
</style></head><body><!-- 🔐 حماية --><script>
if(localStorage.getItem("login") !== "true"){
    window.location.href = "login.html";
}
</script><div class="nav">
<h2>⚡ Dashboard</h2>
<button onclick="logout()">Logout</button>
</div><h1>📊 Data Analysis</h1>
<p>Submitted to Eng. Yara 👩‍🏫</p>
<p>By: Abdullah Badawy 🚀</p><input type="file" id="fileInput">
<button onclick="uploadDataset()">Upload Dataset</button><div>
    <div class="card">Mean <div id="mean">0</div></div>
    <div class="card">Median <div id="median">0</div></div>
    <div class="card">Mode <div id="mode">0</div></div>
    <div class="card">Range <div id="range">0</div></div>
    <div class="card">Variance <div id="variance">0</div></div>
    <div class="card">Std Dev <div id="std">0</div></div>
</div><h2>📈 Charts</h2><canvas id="barChart"></canvas>
<canvas id="scatterChart"></canvas>
<canvas id="pieChart"></canvas>
<canvas id="histChart"></canvas>
<canvas id="boxChart"></canvas>

<script>

// 🔓 Logout
function logout(){
    localStorage.removeItem("login");
    window.location.href="login.html";
}

// 📂 Upload
async function uploadDataset() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Upload file!");

    let text = "";

    // TXT
    if (file.type === "text/plain") {
        text = await file.text();
    }

    // PDF
    else if (file.type === "application/pdf") {
        const pdf = await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
            let page = await pdf.getPage(i);
            let content = await page.getTextContent();
            text += content.items.map(i => i.str).join(" ");
        }
    }

    // Image
    else if (file.type.startsWith("image/")) {
        const result = await Tesseract.recognize(file, 'eng');
        text = result.data.text;
    }

    let numbers = text.match(/-?\d+(\.\d+)?/g);
    if (!numbers) return alert("No numbers found!");

    numbers = numbers.map(Number);

    calculate(numbers);
    drawCharts(numbers);
}

// 🧠 Calculate
function calculate(numbers) {

    let sum = numbers.reduce((a,b)=>a+b,0);
    let mean = sum / numbers.length;

    let sorted = [...numbers].sort((a,b)=>a-b);

    let median = sorted.length % 2 === 0 ?
        (sorted[sorted.length/2 -1] + sorted[sorted.length/2]) / 2 :
        sorted[Math.floor(sorted.length/2)];

    let mode = numbers.sort((a,b)=>
        numbers.filter(v=>v===a).length - numbers.filter(v=>v===b).length
    ).pop();

    let range = Math.max(...numbers) - Math.min(...numbers);

    let variance = numbers.reduce((a,b)=>a + Math.pow(b-mean,2),0) / numbers.length;

    let std = Math.sqrt(variance);

    document.getElementById("mean").innerText = mean.toFixed(2);
    document.getElementById("median").innerText = median;
    document.getElementById("mode").innerText = mode;
    document.getElementById("range").innerText = range;
    document.getElementById("variance").innerText = variance.toFixed(2);
    document.getElementById("std").innerText = std.toFixed(2);
}

// 📊 Charts
let charts = [];

function destroyCharts(){
    charts.forEach(c=>c.destroy());
    charts = [];
}

function drawCharts(data) {

    destroyCharts();

    // Bar
    charts.push(new Chart(barChart, {
        type: 'bar',
        data: {
            labels: data.map((_,i)=>i+1),
            datasets: [{ label: 'Data', data }]
        }
    }));

    // Scatter
    charts.push(new Chart(scatterChart, {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'Scatter',
                data: data.map((v,i)=>({x:i,y:v}))
            }]
        }
    }));

    // Pie
    charts.push(new Chart(pieChart, {
        type: 'pie',
        data: {
            labels: data,
            datasets: [{ data }]
        }
    }));

    // Histogram
    let bins = 5;
    let min = Math.min(...data);
    let max = Math.max(...data);
    let size = (max - min) / bins;

    let hist = new Array(bins).fill(0);

    data.forEach(v=>{
        let i = Math.min(Math.floor((v-min)/size), bins-1);
        hist[i]++;
    });

    charts.push(new Chart(histChart, {
        type: 'bar',
        data: {
            labels: hist.map((_,i)=>"Bin "+(i+1)),
            datasets: [{ label: 'Histogram', data: hist }]
        }
    }));

    // Box Plot (تقريبي)
    let sorted = [...data].sort((a,b)=>a-b);
    let q1 = sorted[Math.floor(sorted.length/4)];
    let q3 = sorted[Math.floor(3*sorted.length/4)];

    charts.push(new Chart(boxChart, {
        type: 'bar',
        data: {
            labels: ["Min","Q1","Median","Q3","Max"],
            datasets: [{
                label: 'Box',
                data: [
                    Math.min(...data),
                    q1,
                    sorted[Math.floor(sorted.length/2)],
                    q3,
                    Math.max(...data)
                ]
            }]
        }
    }));
}

</script></body>
</html>
