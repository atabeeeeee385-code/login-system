<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Statistics Dashboard</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body {
    margin: 0;
    background: #050505;
    color: #00ffcc;
    font-family: monospace;
}

/* Navbar */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    border-bottom: 1px solid #00ffcc;
}

button {
    border: 1px solid #00ffcc;
    background: transparent;
    color: #00ffcc;
    padding: 8px;
    cursor: pointer;
}

/* Upload */
.upload {
    text-align: center;
    margin: 20px;
}

/* Cards */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    border: 1px solid #00ffcc;
    padding: 20px;
    text-align: center;
}

/* Charts */
canvas {
    background: white;
    margin: 10px;
    border-radius: 5px;
}

/* Formulas */
.formulas {
    text-align: center;
    color: #aaa;
}
</style></head><body><div class="nav">
<h2>⚡ Dashboard</h2>
<div>
<span id="user"></span>
<button onclick="logout()">Logout</button>
</div>
</div><h1 style="text-align:center;">📊 Data Analysis</h1><h3 style="text-align:center;color:#888;">
Submitted to Eng. Yara 👩‍🏫<br>
By: Abdallah Badawy 🚀
</h3><!-- Upload --><div class="upload">
<input type="file" id="fileInput">
<button onclick="loadFile()">Upload Dataset</button>
</div><!-- Cards --><div class="container">
<div class="card"><h3>Mean</h3><p id="mean"></p></div>
<div class="card"><h3>Median</h3><p id="median"></p></div>
<div class="card"><h3>Mode</h3><p id="mode"></p></div>
<div class="card"><h3>Range</h3><p id="range"></p></div>
<div class="card"><h3>Variance</h3><p id="variance"></p></div>
<div class="card"><h3>Std Dev</h3><p id="std"></p></div>
</div><!-- Formulas --><div class="formulas">
<h2>📘 Formulas</h2>
<p>Mean = Σx / n</p>
<p>Variance = Σ(x - μ)² / n</p>
<p>Std Dev = √Variance</p>
</div><!-- Charts --><div style="text-align:center;">
<canvas id="barChart"></canvas>
<canvas id="histChart"></canvas>
</div><script>

// حماية
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}

document.getElementById("user").innerText =
"👤 " + localStorage.getItem("username");

function loadFile() {
    let file = document.getElementById("fileInput").files[0];
    let reader = new FileReader();

    reader.onload = function(e) {
        let data = e.target.result
        .split(/[\s,]+/)
        .map(Number)
        .filter(x => !isNaN(x));

        calculate(data);
        drawCharts(data);
    };

    reader.readAsText(file);
}

function calculate(data) {
    let n = data.length;

    let mean = data.reduce((a,b)=>a+b,0)/n;

    let sorted = [...data].sort((a,b)=>a-b);

    let median = n%2 ? sorted[Math.floor(n/2)] :
    (sorted[n/2-1]+sorted[n/2])/2;

    let freq = {};
    data.forEach(x => freq[x]=(freq[x]||0)+1);

    let mode = Object.keys(freq)
    .reduce((a,b)=>freq[a]>freq[b]?a:b);

    let range = Math.max(...data)-Math.min(...data);

    let variance = data.reduce((s,x)=>
    s+Math.pow(x-mean,2),0)/n;

    let std = Math.sqrt(variance);

    meanEl.innerText = mean.toFixed(2);
    medianEl.innerText = median;
    modeEl.innerText = mode;
    rangeEl.innerText = range;
    varianceEl.innerText = variance.toFixed(2);
    stdEl.innerText = std.toFixed(2);
}

// charts
let barChart, histChart;

function drawCharts(data) {

    if (barChart) barChart.destroy();
    if (histChart) histChart.destroy();

    barChart = new Chart(barChartCanvas, {
        type: 'bar',
        data: {
            labels: data,
            datasets: [{ data: data }]
        }
    });

    histChart = new Chart(histChartCanvas, {
        type: 'line',
        data: {
            labels: data,
            datasets: [{ data: data }]
        }
    });
}

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script></body>
</html>
