<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            background: black;
            color: #00ff00;
            font-family: monospace;
            text-align: center;
            margin-top: 100px;
        }
        button {
            padding: 10px;
            background: black;
            color: #00ff00;
            border: 1px solid #00ff00;
        }
    </style>
</head>
<body>

<h1>Welcome Admin 👋</h1>

<button onclick="logout()">Logout</button>

<script>
// حماية الصفحة
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}

function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}
</script>

</body>
</html>
