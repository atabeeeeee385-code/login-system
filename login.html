<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title><style>
body {
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    border:1px solid #00ffcc;
    padding:40px;
    text-align:center;
    width:300px;
}

input {
    width:90%;
    padding:10px;
    margin:10px;
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
}

button {
    padding:10px;
    width:95%;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

button:hover {
    background:#00ffcc;
    color:black;
}
</style></head><body><div class="box">
<h2>🔐 Login</h2><input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password"><p id="msg" style="color:red;"></p><button onclick="login()">Login</button>

<p style="font-size:12px;">Eng. Yara 👩‍🏫</p>
</div><script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u==="admin" && p==="111"){
        localStorage.setItem("login","true");
        window.location.href="index.html";
    } else {
        document.getElementById("msg").innerText="Wrong data ❌";
    }
}
</script></body>
</html>
